decisions:
  - id: "DEC-001"
    phase: "P0"
    decision: "Use Algorand Python (algopy) for smart contracts, not PyTeal"
    rationale: "User preference. Cleaner syntax, typed Python, better AlgoKit integration. Modern Algorand development standard."
    alternatives: "PyTeal (verbose, older), raw TEAL (too low-level)"
    timestamp: "2026-03-23T06:00:00Z"
  - id: "DEC-002"
    phase: "P0"
    decision: "Use AlgoKit CLI for project scaffolding and tooling"
    rationale: "Official Algorand toolchain. Handles compilation, deployment, local network, testing."
    alternatives: "Manual setup (error-prone), third-party tools"
    timestamp: "2026-03-23T06:00:00Z"
  - id: "DEC-003"
    phase: "P0"
    decision: "React 19 + Vite + Tailwind for frontend with AlgoGate-inspired design"
    rationale: "User wants AlgoGate SDK aesthetic (glassmorphism, spotlight cards, Silk 3D background). React ecosystem has best Algorand wallet integration (use-wallet)."
    alternatives: "Next.js (heavier for a single-page dashboard), SvelteKit (less Algorand ecosystem support)"
    timestamp: "2026-03-23T06:00:00Z"
  - id: "DEC-005"
    phase: "P0"
    decision: "Project renamed from PayStream to AlgoFlow"
    rationale: "Shorter, more memorable, ties to Algorand branding. Better for hackathon presentation."
    alternatives: "PayStream, FlowPay, SalaryFlow, StreamFi, PayWave"
    timestamp: "2026-03-23T06:15:00Z"
  - id: "DEC-006"
    phase: "P0"
    decision: "Two separate dashboard pages — employer dashboard and employee dashboard"
    rationale: "More impressive for judges — shows role-based thinking, each page fully dedicated to its user. User agreed this is more impactful."
    alternatives: "Single page with role toggle (simpler but less impressive)"
    timestamp: "2026-03-23T06:15:00Z"
  - id: "DEC-007"
    phase: "P0"
    decision: "Dark theme with AlgoGate SDK aesthetic — glassmorphism, spotlight cards, Silk 3D background"
    rationale: "User explicitly wants to replicate AlgoGate's frontend design. Dark theme preferred."
    alternatives: "Light theme, custom design (slower to build)"
    timestamp: "2026-03-23T06:15:00Z"
  - id: "DEC-008"
    phase: "P0"
    decision: "Include automated demo script as fallback"
    rationale: "Solo builder — if live demo breaks during judging, Python script runs the full flow in terminal as backup."
    alternatives: "No fallback (risky for live demo)"
    timestamp: "2026-03-23T06:15:00Z"
  - id: "DEC-011"
    phase: "P0"
    decision: "Milestone-based payments included in MVP via milestone_pay() method"
    rationale: "User says judges would find it useful. Problem statement explicitly mentions 'milestone-based'. Simple inner transaction — no complex milestone state."
    alternatives: "Defer to stretch (rejected by user)"
    timestamp: "2026-03-23T06:30:00Z"
  - id: "DEC-012"
    phase: "P0"
    decision: "PAYUSD displayed as stablecoin analog ($1 = 1 PAYUSD, like USDT)"
    rationale: "Makes demo immediately understandable. Dollar signs in UI. Removes volatility confusion."
    alternatives: "Generic token units (less intuitive for judges)"
    timestamp: "2026-03-23T06:30:00Z"
  - id: "DEC-013"
    phase: "P0"
    decision: "Wallet risk resolved — @txnlab/use-wallet-react with KMD (LocalNet) + Pera (Testnet)"
    rationale: "Same useWallet() hook for both environments. KMD provider built into AlgoKit. Zero code changes between networks."
    alternatives: "Single wallet (would break on one network)"
    timestamp: "2026-03-23T06:30:00Z"
  - id: "DEC-014"
    phase: "P0"
    decision: "Timezone handling implemented — UTC on-chain, local time in frontend"
    rationale: "User wants robust application. Browser Intl API detects timezone. All displayed times in local format."
    alternatives: "UTC only (less polished)"
    timestamp: "2026-03-23T06:30:00Z"
  - id: "DEC-015"
    phase: "P0"
    decision: "Multi-unit rate display — $/hr, $/day, $/week, $/month"
    rationale: "Employee-facing feature. Converts hourly rate to all units for clarity."
    alternatives: "Hourly only (less user-friendly)"
    timestamp: "2026-03-23T06:30:00Z"
  - id: "DEC-009"
    phase: "P0"
    decision: "Algorand Rekeying as bombshell feature for delegated transaction authority"
    rationale: "Problem statement explicitly requires 'secure account control mechanisms supporting delegated transaction authority'. Rekeying is unique to Algorand — no other chain has it natively. Judges will recognize deep protocol understanding."
    alternatives: "Box storage (less visually impressive), ARC-4 compliance (already doing it), milestone-based payments (complex to implement in 48h)"
    timestamp: "2026-03-23T06:20:00Z"
  - id: "DEC-010"
    phase: "P0"
    decision: "LocalNet for development, Testnet for final demo"
    rationale: "Faster iteration on LocalNet (no faucet, instant blocks). Deploy to Testnet at the end for judges to verify on explorer."
    alternatives: "Testnet-only (slower dev), LocalNet-only (less impressive for judges)"
    timestamp: "2026-03-23T06:20:00Z"
  - id: "DEC-004"
    phase: "P0"
    decision: "Frontend built AFTER smart contract infrastructure is complete"
    rationale: "User explicitly requested this ordering. Contracts must be deployed and tested before dashboard can interact with them."
    alternatives: "Parallel development (risky for hackathon — contract API changes break frontend)"
    timestamp: "2026-03-23T06:00:00Z"

